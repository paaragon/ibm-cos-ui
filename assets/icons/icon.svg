<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with IBM blue -->
  <circle cx="256" cy="256" r="240" fill="#0F62FE" stroke="#ffffff" stroke-width="8"/>
  
  <!-- Cloud shape representing Cloud Object Storage -->
  <g transform="translate(256, 200) scale(0.8)">
    <!-- Main cloud body -->
    <path d="M-80 0 C-80 -30, -50 -60, -20 -60 C0 -80, 40 -80, 60 -60 C80 -60, 100 -40, 100 -10 C100 20, 80 40, 50 40 L-50 40 C-70 40, -80 20, -80 0 Z" fill="#ffffff"/>
  </g>
  
  <!-- Storage containers/buckets -->
  <g transform="translate(256, 320)">
    <!-- Left bucket -->
    <rect x="-60" y="-20" width="30" height="40" rx="4" fill="#ffffff" opacity="0.9"/>
    <!-- Middle bucket -->
    <rect x="-15" y="-25" width="30" height="45" rx="4" fill="#ffffff"/>
    <!-- Right bucket -->
    <rect x="30" y="-20" width="30" height="40" rx="4" fill="#ffffff" opacity="0.9"/>
    
    <!-- Bucket handles/tops -->
    <rect x="-58" y="-22" width="26" height="4" rx="2" fill="#ffffff"/>
    <rect x="-13" y="-27" width="26" height="4" rx="2" fill="#ffffff"/>
    <rect x="32" y="-22" width="26" height="4" rx="2" fill="#ffffff"/>
  </g>
  
  <!-- Data/object indicators (small dots) -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="220" cy="300" r="3"/>
    <circle cx="240" cy="310" r="3"/>
    <circle cx="270" cy="305" r="3"/>
    <circle cx="290" cy="315" r="3"/>
  </g>
</svg>